name: 24/7 RDP Keep Alive

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-rdp:
    runs-on: windows-latest
    timeout-minutes: 290
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP"
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = "HUU-MINH@123"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (-not (Get-LocalUser -Name "HUU_MINH" -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name "HUU_MINH" -Password $securePass -AccountNeverExpires
          }
          Add-LocalGroupMember -Group "Administrators" -Member "HUU_MINH"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "HUU_MINH"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI

      - name: Create Telegram Bot Script
        shell: cmd
        run: |
          echo import telebot > telegram_bot.py
          echo import os >> telegram_bot.py
          echo import subprocess >> telegram_bot.py
          echo. >> telegram_bot.py
          echo ADMIN_ID = 7235906278 >> telegram_bot.py
          echo BOT_TOKEN = "7845936454:AAGLNFLkCd9y_cJGtnPc_XkbUoN6mF3Cnxg" >> telegram_bot.py
          echo. >> telegram_bot.py
          echo bot = telebot.TeleBot(BOT_TOKEN) >> telegram_bot.py
          echo. >> telegram_bot.py
          echo UPLOAD_FOLDER = "uploads" >> telegram_bot.py
          echo os.makedirs(UPLOAD_FOLDER, exist_ok=True) >> telegram_bot.py
          echo. >> telegram_bot.py
          echo def is_admin(message): >> telegram_bot.py
          echo     return message.from_user.id == ADMIN_ID >> telegram_bot.py
          echo. >> telegram_bot.py
          echo @bot.message_handler(commands=['cmd']) >> telegram_bot.py
          echo def handle_cmd(message): >> telegram_bot.py
          echo     if not is_admin(message): >> telegram_bot.py
          echo         bot.reply_to(message, "Loi: Ban khong phai admin") >> telegram_bot.py
          echo         return >> telegram_bot.py
          echo     command = message.text.replace('/cmd', '').strip() >> telegram_bot.py
          echo     if not command: >> telegram_bot.py
          echo         bot.reply_to(message, "Loi: Chua co lenh. Cu phap: /cmd ^<lenh cmd/powershell^>") >> telegram_bot.py
          echo         return >> telegram_bot.py
          echo     try: >> telegram_bot.py
          echo         result = subprocess.run(command, shell=True, capture_output=True, text=True, timeout=30, encoding='utf-8') >> telegram_bot.py
          echo         output = result.stdout + result.stderr >> telegram_bot.py
          echo         if not output.strip(): >> telegram_bot.py
          echo             output = "(Khong co dau ra)" >> telegram_bot.py
          echo         if len(output) > 4096: >> telegram_bot.py
          echo             output = output[:4093] + "..." >> telegram_bot.py
          echo         bot.reply_to(message, f"Lenh: {command}\nDau ra:\n{output}") >> telegram_bot.py
          echo     except subprocess.TimeoutExpired: >> telegram_bot.py
          echo         bot.reply_to(message, "Loi: Lenh chay qua 30 giay") >> telegram_bot.py
          echo     except Exception as e: >> telegram_bot.py
          echo         bot.reply_to(message, f"Loi thuc thi: {str(e)}") >> telegram_bot.py
          echo. >> telegram_bot.py
          echo @bot.message_handler(commands=['upfile']) >> telegram_bot.py
          echo def handle_upfile(message): >> telegram_bot.py
          echo     if not is_admin(message): >> telegram_bot.py
          echo         bot.reply_to(message, "Loi: Ban khong phai admin") >> telegram_bot.py
          echo         return >> telegram_bot.py
          echo     bot.reply_to(message, "Hay gui file duoi dang tai lieu (document).") >> telegram_bot.py
          echo. >> telegram_bot.py
          echo @bot.message_handler(content_types=['document']) >> telegram_bot.py
          echo def handle_document(message): >> telegram_bot.py
          echo     if not is_admin(message): >> telegram_bot.py
          echo         bot.reply_to(message, "Loi: Ban khong phai admin") >> telegram_bot.py
          echo         return >> telegram_bot.py
          echo     try: >> telegram_bot.py
          echo         file_info = bot.get_file(message.document.file_id) >> telegram_bot.py
          echo         downloaded_file = bot.download_file(file_info.file_path) >> telegram_bot.py
          echo         save_path = os.path.join(UPLOAD_FOLDER, message.document.file_name) >> telegram_bot.py
          echo         with open(save_path, 'wb') as new_file: >> telegram_bot.py
          echo             new_file.write(downloaded_file) >> telegram_bot.py
          echo         bot.reply_to(message, f"Tai file thanh cong: {save_path}") >> telegram_bot.py
          echo     except Exception as e: >> telegram_bot.py
          echo         bot.reply_to(message, f"Tai file that bai: {str(e)}") >> telegram_bot.py
          echo. >> telegram_bot.py
          echo @bot.message_handler(commands=['start']) >> telegram_bot.py
          echo def handle_start(message): >> telegram_bot.py
          echo     if is_admin(message): >> telegram_bot.py
          echo         bot.reply_to(message, "Bot da san sang. Cac lenh: /cmd ^<lenh^>, /upfile") >> telegram_bot.py
          echo     else: >> telegram_bot.py
          echo         bot.reply_to(message, "Bot chi danh cho admin") >> telegram_bot.py
          echo. >> telegram_bot.py
          echo if __name__ == "__main__": >> telegram_bot.py
          echo     print("Bot dang chay...") >> telegram_bot.py
          echo     bot.infinity_polling() >> telegram_bot.py

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Connect Tailscale
        id: tailscale
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-fixed-host
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "IP_ADDRESS=$tsIP"

      - name: Show RDP Info
        run: |
          Write-Host ""
          Write-Host "========================================="
          Write-Host "RDP ACCESS"
          Write-Host "========================================="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: HUU_MINH"
          Write-Host "Password: HUU-MINH@123"
          Write-Host "Port: 3389"
          Write-Host "========================================="
          Write-Host ""

      - name: Start Telegram Bot and Keep RDP Alive
        run: |
          Start-Process python -ArgumentList "telegram_bot.py"
          Start-Sleep -Seconds 5
          $IP = "$env:TAILSCALE_IP"
          $startTime = Get-Date
          $maxMinutes = 280
          while (((Get-Date) - $startTime).TotalMinutes -lt $maxMinutes) {
              Write-Host "[$(Get-Date)] RDP Active - Connect to $IP`:3389"
              Write-Host "Username: HUU_MINH | Password: HUU-MINH@123"
              Write-Host "Telegram bot running - use /cmd and /upfile"
              $tsStatus = & "$env:ProgramFiles\Tailscale\tailscale.exe" status 2>$null
              if ($LASTEXITCODE -ne 0) {
                  & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-fixed-host
              }
              Start-Sleep -Seconds 60
          }
          Write-Host "Shutting down for scheduled restart..."

      - name: Keep Workflow Active
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          echo "Last run: $timestamp - RDP IP: $env:TAILSCALE_IP" > keep_alive.txt
          git add keep_alive.txt
          git commit -m "Keep-alive: RDP heart-beat" || echo "No changes"
          git push || echo "No push"
