name: 24/7 RDP Keep Alive

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh
          echo "TZ=Asia/Ho_Chi_Minh" >> $GITHUB_ENV

      - name: Install XRDP and Desktop
        run: |
          sudo apt update
          sudo apt install -y xrdp xfce4 xfce4-goodies tightvncserver
          sudo sed -i 's/port=3389/port=3389/g' /etc/xrdp/xrdp.ini
          sudo systemctl enable xrdp
          sudo systemctl start xrdp

      - name: Create RDP User
        run: |
          echo "HUU_MINH:HUU-MINH@123" | sudo chpasswd
          sudo adduser HUU_MINH sudo --gecos "" --disabled-password
          echo "HUU_MINH:HUU-MINH@123" | sudo chpasswd
          echo "HUU_MINH ALL=(ALL) NOPASSWD:ALL" | sudo tee -a /etc/sudoers

      - name: Install SSHX
        run: |
          curl -sSf https://sshx.io/get | sh -s run &
          sleep 5

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-ubuntu-host

      - name: Get Tailscale IP
        id: tailscale
        run: |
          tsIP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV
          echo "IP_ADDRESS=$tsIP"

      - name: Show RDP Info
        run: |
          echo ""
          echo "========================================="
          echo "RDP ACCESS"
          echo "========================================="
          echo "Address: ${{ env.TAILSCALE_IP }}"
          echo "Username: HUU_MINH"
          echo "Password: HUU-MINH@123"
          echo "Port: 3389"
          echo "========================================="
          echo ""
          echo "SSHX URL: https://sshx.io"

      - name: Keep RDP Alive
        run: |
          IP="${{ env.TAILSCALE_IP }}"
          startTime=$(date +%s)
          maxSeconds=$((280 * 60))
          while [ $(($(date +%s) - startTime)) -lt $maxSeconds ]; do
            echo "[$(date)] RDP Active - Connect to $IP:3389"
            echo "Username: HUU_MINH | Password: HUU-MINH@123"
            sudo systemctl status xrdp > /dev/null || sudo systemctl start xrdp
            sudo tailscale status > /dev/null || sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-ubuntu-host
            sleep 60
          done
          echo "Shutting down for scheduled restart..."

      - name: Keep Workflow Active
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          timestamp=$(date "+%Y-%m-%d %H:%M:%S")
          echo "Last run: $timestamp - RDP IP: ${{ env.TAILSCALE_IP }}" > keep_alive.txt
          git add keep_alive.txt
          git commit -m "Keep-alive: RDP heart-beat" || echo "No changes"
          git push || echo "No push"
