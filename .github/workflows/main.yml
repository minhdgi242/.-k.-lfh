name: 24/7 RDP Keep Alive

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-rdp:
    runs-on: windows-latest
    timeout-minutes: 290
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP"
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = "HUU-MINH@123"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (-not (Get-LocalUser -Name "HUU_MINH" -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name "HUU_MINH" -Password $securePass -AccountNeverExpires
          }
          Add-LocalGroupMember -Group "Administrators" -Member "HUU_MINH"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "HUU_MINH"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI

      - name: Create Telegram Bot Script
        run: |
          @"
import telebot
import os
import subprocess

ADMIN_ID = 7235906278
BOT_TOKEN = "7845936454:AAGLNFLkCd9y_cJGtnPc_XkbUoN6mF3Cnxg"

bot = telebot.TeleBot(BOT_TOKEN)

UPLOAD_FOLDER = "uploads"
os.makedirs(UPLOAD_FOLDER, exist_ok=True)

def is_admin(message):
    return message.from_user.id == ADMIN_ID

@bot.message_handler(commands=['cmd'])
def handle_cmd(message):
    if not is_admin(message):
        bot.reply_to(message, "Loi: Ban khong phai admin")
        return
    command = message.text.replace('/cmd', '').strip()
    if not command:
        bot.reply_to(message, "Loi: Chua co lenh. Cu phap: /cmd <lenh>")
        return
    try:
        result = subprocess.run(command, shell=True, capture_output=True, text=True, timeout=30, encoding='utf-8')
        output = result.stdout + result.stderr
        if not output.strip():
            output = "(Khong co dau ra)"
        if len(output) > 4096:
            output = output[:4093] + '...'
        bot.reply_to(message, f"Lenh: {command}\nDau ra:\n{output}")
    except subprocess.TimeoutExpired:
        bot.reply_to(message, "Loi: Lenh chay qua 30 giay")
    except Exception as e:
        bot.reply_to(message, f"Loi thuc thi: {str(e)}")

@bot.message_handler(commands=['upfile'])
def handle_upfile(message):
    if not is_admin(message):
        bot.reply_to(message, "Loi: Ban khong phai admin")
        return
    bot.reply_to(message, "Hay gui file duoi dang tai lieu (document).")

@bot.message_handler(content_types=['document'])
def handle_document(message):
    if not is_admin(message):
        bot.reply_to(message, "Loi: Ban khong phai admin")
        return
    try:
        file_info = bot.get_file(message.document.file_id)
        downloaded_file = bot.download_file(file_info.file_path)
        save_path = os.path.join(UPLOAD_FOLDER, message.document.file_name)
        with open(save_path, 'wb') as new_file:
            new_file.write(downloaded_file)
        bot.reply_to(message, f"Tai file thanh cong: {save_path}")
    except Exception as e:
        bot.reply_to(message, f"Tai file that bai: {str(e)}")

@bot.message_handler(commands=['rmfile'])
def handle_rmfile(message):
    if not is_admin(message):
        bot.reply_to(message, "Loi: Ban khong phai admin")
        return
    filename = message.text.replace('/rmfile', '').strip()
    if not filename:
        bot.reply_to(message, "Loi: Chua ten file. Cu phap: /rmfile <ten_file>")
        return
    file_path = os.path.join(UPLOAD_FOLDER, filename)
    try:
        if os.path.exists(file_path):
            os.remove(file_path)
            bot.reply_to(message, f"Da xoa file: {file_path}")
        else:
            bot.reply_to(message, f"Khong tim thay file: {file_path}")
    except Exception as e:
        bot.reply_to(message, f"Loi xoa file: {str(e)}")

@bot.message_handler(commands=['lsfile'])
def handle_lsfile(message):
    if not is_admin(message):
        bot.reply_to(message, "Loi: Ban khong phai admin")
        return
    try:
        files = os.listdir(UPLOAD_FOLDER)
        if not files:
            bot.reply_to(message, "Thu muc uploads trong.")
            return
        file_list = '\n'.join(files)
        if len(file_list) > 4096:
            file_list = file_list[:4093] + '...'
        bot.reply_to(message, f"Danh sach file trong uploads:\n{file_list}")
    except Exception as e:
        bot.reply_to(message, f"Loi doc thu muc: {str(e)}")

@bot.message_handler(commands=['start'])
def handle_start(message):
    if is_admin(message):
        bot.reply_to(message, "Bot RDP san sang. Cac lenh: /cmd, /upfile, /rmfile, /lsfile")
    else:
        bot.reply_to(message, "Bot chi danh cho admin")

if __name__ == "__main__":
    print("Bot dang chay...")
    bot.infinity_polling()
"@ | Out-File -FilePath "telegram_bot.py" -Encoding UTF8

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Connect Tailscale
        id: tailscale
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-fixed-host
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "IP_ADDRESS=$tsIP"

      - name: Show RDP Info
        run: |
          Write-Host ""
          Write-Host "========================================="
          Write-Host "RDP ACCESS"
          Write-Host "========================================="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: HUU_MINH"
          Write-Host "Password: HUU-MINH@123"
          Write-Host "Port: 3389"
          Write-Host "========================================="
          Write-Host ""

      - name: Send Telegram Start Notification
        run: |
          $url = "https://api.telegram.org/bot7845936454:AAGLNFLkCd9y_cJGtnPc_XkbUoN6mF3Cnxg/sendMessage"
          $body = @{
              chat_id = "7235906278"
              text = "RDP STARTED at $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')`nTailscale IP: $env:TAILSCALE_IP`nUser: HUU_MINH`nPass: HUU-MINH@123`nPort: 3389"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri $url -Method Post -Body $body -ContentType "application/json"

      - name: Start Telegram Bot and Keep RDP Alive
        run: |
          Start-Process -NoNewWindow -FilePath "python" -ArgumentList "telegram_bot.py"
          $url = "https://api.telegram.org/bot7845936454:AAGLNFLkCd9y_cJGtnPc_XkbUoN6mF3Cnxg/sendMessage"
          $IP = "$env:TAILSCALE_IP"
          $startTime = Get-Date
          $maxMinutes = 280
          $heartbeatCounter = 0
          while (((Get-Date) - $startTime).TotalMinutes -lt $maxMinutes) {
              Write-Host "[$(Get-Date)] RDP Active - Connect to $IP`:3389"
              Write-Host "Username: HUU_MINH | Password: HUU-MINH@123"
              $tsStatus = & "$env:ProgramFiles\Tailscale\tailscale.exe" status 2>$null
              if ($LASTEXITCODE -ne 0) {
                  & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-fixed-host
              }
              $heartbeatCounter++
              if ($heartbeatCounter -ge 60) {
                  $heartbeat = @{
                      chat_id = "7235906278"
                      text = "[HEARTBEAT] RDP still running. Uptime: $([math]::Round(((Get-Date) - $startTime).TotalMinutes,0)) minutes. IP: $IP"
                  } | ConvertTo-Json
                  Invoke-RestMethod -Uri $url -Method Post -Body $heartbeat -ContentType "application/json" -ErrorAction SilentlyContinue
                  $heartbeatCounter = 0
              }
              Start-Sleep -Seconds 60
          }
          Write-Host "Shutting down for scheduled restart..."

      - name: Keep Workflow Active
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          echo "Last run: $timestamp - RDP IP: $env:TAILSCALE_IP" > keep_alive.txt
          git add keep_alive.txt
          git commit -m "Keep-alive: RDP heart-beat" || echo "No changes"
          git push || echo "No push"
